<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Trading Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="config.js"></script>
    
    <style>
        /* Global Styles: Dark Theme */
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #131722; color: #d1d4dc; overflow: hidden; }
        
        /* 1. Left Panel: Watchlist */
        #left-panel { width: 260px; background-color: #1e222d; border-right: 1px solid #2a2e39; display: flex; flex-direction: column; }
        .panel-header { padding: 15px; font-weight: bold; border-bottom: 1px solid #2a2e39; font-size: 14px; color: #787b86; text-transform: uppercase; letter-spacing: 1px;}
        
        .search-container { padding: 10px 15px; border-bottom: 1px solid #2a2e39; }
        #stock-search { width: 100%; box-sizing: border-box; padding: 8px 10px; background-color: #131722; border: 1px solid #2a2e39; color: #d1d4dc; border-radius: 4px; outline: none; font-size: 14px; transition: border-color 0.2s;}
        #stock-search:focus { border-color: #2962FF; }

        #stock-list { flex-grow: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        
        /* --- 修改后的 Stock Item 布局 --- */
        .stock-item { 
            padding: 10px 15px; 
            cursor: pointer; 
            border-bottom: 1px solid #2a2e39; 
            transition: background 0.2s; 
            display: flex; 
            flex-direction: row; /* 横向排列 */
            justify-content: space-between; /* 名字左，数据右 */
            align-items: center;
        }
        .stock-item:hover { background-color: #2a2e39; }
        .stock-item.active { background-color: #2a2e39; border-left: 3px solid #2962FF; }
        
        /* 左侧名字容器 */
        .stock-info-left { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .stock-name { font-size: 14px; font-weight: bold; color: #d1d4dc; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stock-ticker { font-size: 11px; color: #787b86; letter-spacing: 0.5px;}

        /* 右侧涨跌幅容器 */
        .stock-info-right { text-align: right; margin-left: 10px; }
        .price-pct { font-size: 15px; font-weight: bold; line-height: 1.2; }
        .price-abs { font-size: 11px; margin-top: 2px; opacity: 0.8; }

        .stock-item.active .stock-name { color: #ffffff; }
        .stock-item.active .stock-ticker { color: #b2b5be; }
        
        /* 颜色定义 */
        .up-color { color: #26a69a !important; }
        .down-color { color: #ef5350 !important; }
        .neutral-color { color: #787b86 !important; }
        
        /* 2. Center Panel: Chart */
        #center-panel { flex-grow: 1; display: flex; flex-direction: column; background-color: #131722; position: relative;}
        #chart-header { padding: 15px 20px; border-bottom: 1px solid #2a2e39; display: flex; align-items: center; justify-content: space-between; gap: 15px;}
        #loading-indicator { font-size: 14px; color: #f5a623; display: none; }
        #tvchart { flex-grow: 1; width: 100%; position: relative; }

        /* 3. Right Panel: Info */
        #right-panel { width: 280px; background-color: #1e222d; border-left: 1px solid #2a2e39; display: flex; flex-direction: column; }
        .info-block { padding: 20px; border-bottom: 1px solid #2a2e39; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px;}
        .info-label { color: #787b86; }
        .info-value { font-weight: bold; color: #fff; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #434651; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #5d606b; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div class="panel-header">Watchlist</div>
        <div class="search-container">
            <input type="text" id="stock-search" placeholder="Search Name or Ticker..." oninput="filterStocks()">
        </div>
        <ul id="stock-list"></ul>
    </div>

    <div id="center-panel">
        <div id="chart-header">
            <div id="current-ticker">Loading...</div>
            <span id="loading-indicator">Fetching data...</span>
        </div>
        <div id="tvchart"></div>
    </div>

    <div id="right-panel">
        <div class="panel-header">Latest Data</div>
        <div id="info-content" class="info-block">
            <div style="color: #787b86; font-size: 14px;">Please select a ticker...</div>
        </div>
    </div>

    <script>
        const supabaseClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        let chart = null;
        let currentActiveTicker = null;

        window.onload = async () => {
            await fetchStockList();
            if (CONFIG.DEFAULT_TICKER) {
                loadStockData(CONFIG.DEFAULT_TICKER);
            }
        };

        async function fetchStockList() {
            try {
                // 1. 获取所有产品
                let query = supabaseClient.from('products').select('id, ticker, name');
                if (CONFIG.ASSET_CLASS) query = query.eq('asset_class', CONFIG.ASSET_CLASS);
                const { data: products, error: pErr } = await query;
                if (pErr) throw pErr;

                // 2. 获取最近的两个交易日期
                const { data: dates, error: dErr } = await supabaseClient.rpc('get_latest_dates');
                const latestDate = dates[0]?.t_date;
                const prevDate = dates[1]?.t_date;
                
                // 3. 获取这两天的所有报价数据
                const { data: quoteData, error: qErr } = await supabaseClient
                    .from('quotes')
                    .select('product_id, trade_date, close, volume') 
                    .eq('vendor_id', CONFIG.VENDOR_ID)
                    .in('trade_date', [latestDate, prevDate]);

                const priceMap = {}; // { productId: { latestClose, prevClose, turnover } }
                if (!qErr && quoteData) {
                    quoteData.forEach(q => {
                        if (!priceMap[q.product_id]) priceMap[q.product_id] = { latest: 0, prev: 0, turnover: 0 };
                        if (q.trade_date === latestDate) {
                            priceMap[q.product_id].latest = q.close;
                            priceMap[q.product_id].turnover = (q.volume || 0) * (q.close || 0);
                        } else {
                            priceMap[q.product_id].prev = q.close;
                        }
                    });
                }

                // 4. 组装数据并排序
                products.forEach(p => {
                    const stats = priceMap[p.id] || { latest: 0, prev: 0, turnover: 0 };
                    p.latestTurnover = stats.turnover;
                    p.latestClose = stats.latest;
                    p.prevClose = stats.prev;
                    
                    // 计算涨跌
                    if (p.latestClose && p.prevClose) {
                        p.change = p.latestClose - p.prevClose;
                        p.pct = (p.change / p.prevClose) * 100;
                    } else {
                        p.change = 0;
                        p.pct = 0;
                    }
                });
                
                products.sort((a, b) => b.latestTurnover - a.latestTurnover);

                // 5. 渲染 UI
                const listEl = document.getElementById('stock-list');
                listEl.innerHTML = ''; 

                products.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'stock-item';
                    li.id = `nav-${item.ticker}`;
                    
                    const dispName = item.name ? item.name : item.ticker;
                    const searchStr = `${dispName} ${item.ticker}`.toUpperCase();
                    li.setAttribute('data-search', searchStr);

                    // 确定颜色
                    const colorClass = item.change > 0 ? 'up-color' : (item.change < 0 ? 'down-color' : 'neutral-color');
                    const sign = item.change > 0 ? '+' : '';

                    li.innerHTML = `
                        <div class="stock-info-left">
                            <div class="stock-name" title="${dispName}">${dispName}</div>
                            <div class="stock-ticker">${item.ticker}</div>
                        </div>
                        <div class="stock-info-right">
                            <div class="price-pct ${colorClass}">${sign}${item.pct.toFixed(2)}%</div>
                            <div class="price-abs ${colorClass}">${sign}${item.change.toFixed(2)}</div>
                        </div>
                    `;
                    
                    li.onclick = () => loadStockData(item.ticker);
                    listEl.appendChild(li);
                });
            } catch (err) {
                console.error("Failed to load watchlist:", err);
            }
        }

        // --- 以下 loadStockData, filterStocks, renderChart, updateRightPanel 保持不变 ---
        // (为了保持回答简洁，此处省略了你原始代码中未修改的部分，请继续使用你原来的 JS 函数)
        
        let searchTimeout = null;
        function filterStocks() {
            if (searchTimeout) clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const filterValue = document.getElementById('stock-search').value.toUpperCase();
                const items = document.getElementsByClassName('stock-item');
                for (let i = 0; i < items.length; i++) {
                    const text = items[i].getAttribute('data-search');
                    items[i].style.display = text.indexOf(filterValue) > -1 ? 'flex' : 'none';
                }
            }, 150);
        }

        async function loadStockData(ticker) {
            if (currentActiveTicker === ticker) return; 
            currentActiveTicker = ticker;
            document.querySelectorAll('.stock-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`nav-${ticker}`);
            if (activeEl) activeEl.classList.add('active');
            const loadingIndicator = document.getElementById('loading-indicator');
            loadingIndicator.style.display = 'block';
            try {
                const { data: mappingData, error: mapErr } = await supabaseClient.from('products').select('id, name').eq('ticker', ticker).maybeSingle();
                if (mapErr || !mappingData) throw new Error("Product ID not found");
                const dispName = mappingData.name ? mappingData.name : ticker;
                document.getElementById('current-ticker').innerHTML = `
                    <div style="display: flex; flex-direction: column; line-height: 1.2;">
                        <span style="font-size: 20px; font-weight: bold; color: #fff;">${dispName}</span>
                        <span style="font-size: 13px; color: #787b86; font-weight: normal; margin-top: 4px;">${ticker}</span>
                    </div>
                `;
                const { data: quotes, error: qErr } = await supabaseClient.from('quotes').select('trade_date, open, high, low, close, volume').eq('product_id', mappingData.id).eq('vendor_id', CONFIG.VENDOR_ID).order('trade_date', { ascending: true });
                if (qErr || !quotes || quotes.length === 0) throw new Error("No quote data available");
                renderChart(quotes);
                updateRightPanel(quotes[quotes.length - 1], quotes[quotes.length - 2]);
            } catch (err) {
                console.error(err);
                document.getElementById('info-content').innerHTML = `<div style="color:#ef5350;">Data loading failed: ${err.message}</div>`;
                if(chart) { chart.remove(); chart = null; }
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }

        function updateRightPanel(latest, previous) {
            if (!latest) return;
            let changeStr = "N/A";
            let colorClass = "";
            if (previous) {
                const change = latest.close - previous.close;
                const percent = (change / previous.close * 100).toFixed(2);
                const sign = change >= 0 ? "+" : "";
                colorClass = change >= 0 ? "up-color" : "down-color";
                changeStr = `${sign}${change.toFixed(2)} (${sign}${percent}%)`;
            }
            const html = `
                <div style="font-size: 32px; font-weight: bold; margin-bottom: 5px;" class="${colorClass}">$${latest.close.toFixed(2)}</div>
                <div style="font-size: 14px; margin-bottom: 25px;" class="${colorClass}">${changeStr}</div>
                <div class="info-row"><span class="info-label">Date</span><span class="info-value">${latest.trade_date}</span></div>
                <div class="info-row"><span class="info-label">Open</span><span class="info-value">${latest.open.toFixed(2)}</span></div>
                <div class="info-row"><span class="info-label">High</span><span class="info-value">${latest.high.toFixed(2)}</span></div>
                <div class="info-row"><span class="info-label">Low</span><span class="info-value">${latest.low.toFixed(2)}</span></div>
                <div class="info-row"><span class="info-label">Volume</span><span class="info-value">${(latest.volume / 1000000).toFixed(2)} M</span></div>
            `;
            document.getElementById('info-content').innerHTML = html;
        }

        function renderChart(quotesData) {
            const container = document.getElementById('tvchart');
            if (chart !== null) chart.remove();
            chart = LightweightCharts.createChart(container, {
                layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
                grid: { vertLines: { color: '#2a2e39' }, horzLines: { color: '#2a2e39' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { borderColor: '#2a2e39' },
                autoSize: true, 
            });
            const candlestickSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
                upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
                wickUpColor: '#26a69a', wickDownColor: '#ef5350',
            });
            const volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
                color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '', 
            });
            chart.priceScale('').applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });
            const candleData = [];
            const volumeData = [];
            quotesData.forEach(row => {
                candleData.push({ time: row.trade_date, open: row.open, high: row.high, low: row.low, close: row.close });
                const isUp = row.close >= row.open;
                volumeData.push({ time: row.trade_date, value: row.volume, color: isUp ? '#26a69a80' : '#ef535080' });
            });
            candlestickSeries.setData(candleData);
            volumeSeries.setData(volumeData);
            chart.timeScale().fitContent();
        }

        window.addEventListener('resize', () => {
            if (chart) chart.applyOptions({ width: document.getElementById('center-panel').clientWidth });
        });
    </script>
</body>
</html>
